<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app">
        <h1>{{message}}</h1>
        <h1>{{count}}</h1>
    </div>
    <script type="module">
        import { createApp, ref } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js'
        createApp({
            //定义方法，然后写return
            data() {
                return {
                    message : 'Hello Vue',
                    count:100
                }
            }
        }).mount('#app') //需要接管的标签(挂载)
    </script>
</body>

</html>
