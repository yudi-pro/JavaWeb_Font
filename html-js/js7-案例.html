<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表格鼠标滑过变色</title>
    <style>
        table {
            border-collapse: collapse;
            width: 500px;
            margin: 50px auto;
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 12px 16px;
            text-align: center;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr {
            transition: background-color 0.3s;
        }
    </style>
</head>
<body>
    <table id="myTable">
        <thead>
            <tr>
                <th>姓名</th>
                <th>年龄</th>
                <th>城市</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>张三</td>
                <td>25</td>
                <td>北京</td>
            </tr>
            <tr>
                <td>李四</td>
                <td>30</td>
                <td>上海</td>
            </tr>
            <tr>
                <td>王五</td>
                <td>28</td>
                <td>广州</td>
            </tr>
            <tr>
                <td>赵六</td>
                <td>22</td>
                <td>深圳</td>
            </tr>
        </tbody>
    </table>

    <script>
        // 获取表格中 tbody 里的所有行
        var rows = document.querySelectorAll('#myTable tbody tr');

        // 遍历每一行，绑定 mouseover 和 mouseout 事件
        rows.forEach(function(row) {
            // 鼠标滑过时改变背景色
            row.addEventListener('mouseover', function() { //mouseover鼠标进入
                this.style.backgroundColor = '#f2e2e2';
            });
            // 鼠标离开时恢复背景色
            row.addEventListener('mouseout', function() {  //mouseout鼠标离开
                this.style.backgroundColor = '#fff';
            });
        });
    </script>
</body>
</html>
