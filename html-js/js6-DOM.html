<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-DOM</title>
</head>

<body>
    <h1 id="title1">111</h1>
    <h1>222</h1>
    <h1>333</h1>
    <script>
        //修改第一个h1标签的内容
        //1.获取DOM对象
        // let h1= document.querySelector('#title1');
        // let h1= document.querySelector('h1');  //默认获取第一个h1标签
        let all= document.querySelectorAll('h1');
        //调用DOM对象中的属性
        all[0].innerHTML="修改后的文本"
    </script>
</body>

</html>
